[package]
name = "sms_api"
version = "0.1.0"
edition = "2024"

[lib]
name = "sms_api"

[dependencies]
openapi = { version = "1.0.0", path = "../twilio" }
serde      = { workspace = true }
serde_json = { workspace = true }
thiserror  = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
tracing    = { workspace = true }
utils      = { workspace = true, features = ["reqwest"] }

[dev-dependencies]
wiremock = "0.6"
tokio    = { workspace = true }
